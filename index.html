<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1A2E" />
    <meta name="description" content="Configurez votre porte blindée Picard Serrures sur mesure. Sécurité haute exigence, élégance intemporelle, depuis 1720." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>Picard Serrures — Configurateur de portes blindées</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form so Netlify Forms detects "devis" at build time. -->
    <form name="devis" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="postalCode" />
      <input type="text" name="projectType" />
      <input type="text" name="timeline" />
      <textarea name="configuration"></textarea>
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
