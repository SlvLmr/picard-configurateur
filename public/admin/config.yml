backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "public/ambiances"
public_folder: "/ambiances"

site_url: https://picard-configurateur.netlify.app
display_url: https://picard-configurateur.netlify.app
logo_url: /LOGO-PICARD-SERRURES-MIDNIGHT.png
locale: fr

collections:
  - name: "doors_collection"
    label: "Modèles de portes"
    label_singular: "Modèle"
    description: "Les modèles affichés sur l'écran d'accueil. Chaque porte a ses propres hotspots techniques."
    files:
      - name: "doors"
        label: "Liste des modèles"
        file: "src/data/doors.json"
        format: "json"
        fields:
          - name: items
            label: "Modèles"
            label_singular: "Modèle"
            widget: list
            summary: "{{fields.name}} ({{fields.category}}) — {{fields.price}}"
            fields:
              - { name: id, label: "ID (unique)", widget: number, value_type: int, min: 1 }
              - { name: slug, label: "Slug", widget: string, hint: "Identifiant URL ex. diamant-10" }
              - { name: name, label: "Nom", widget: string }
              - name: category
                label: "Catégorie d'usage"
                widget: select
                options:
                  - { label: "Appartement", value: "appartement" }
                  - { label: "Maison", value: "maison" }
              - { name: range, label: "Gamme / mention courte", widget: string, hint: "Ex. Appartement, Maison individuelle, Premium…" }
              - { name: security, label: "Étoiles A2P (1-5)", widget: number, value_type: int, min: 1, max: 5 }
              - { name: priceFrom, label: "Prix de départ (entier en €)", widget: number, value_type: int, min: 0 }
              - { name: price, label: "Affichage prix", widget: string, hint: "Ex. À partir de 4 990 €" }
              - { name: desc, label: "Description courte", widget: text }
              - { name: icon, label: "Icône (caractère unicode)", widget: string, required: false }
              - name: panelStyle
                label: "Style de panneau (rendu placeholder)"
                widget: select
                options:
                  - { label: "Plein", value: "full_panel" }
                  - { label: "Lignes horizontales", value: "horizontal_lines" }
                  - { label: "Vitrage asymétrique", value: "asymmetric_glass" }
                  - { label: "Renforcé", value: "fortress" }
              - name: hotspots
                label: "Hotspots techniques de cette porte"
                widget: list
                hint: "Pastilles cliquables sur la porte. Position en %. 0,0 = haut-gauche."
                summary: "{{fields.title}} ({{fields.x}}, {{fields.y}})"
                fields:
                  - { name: id, label: "ID slug", widget: string }
                  - { name: label, label: "Étiquette courte", widget: string }
                  - { name: x, label: "Position X (%)", widget: number, value_type: int, min: 0, max: 100 }
                  - { name: y, label: "Position Y (%)", widget: number, value_type: int, min: 0, max: 100 }
                  - { name: title, label: "Titre du détail", widget: string }
                  - { name: description, label: "Description", widget: text }

  - name: "ambiances_collection"
    label: "Ambiances"
    label_singular: "Ambiance"
    description: "Visuels de fond projetant la porte dans son contexte (intérieur ou extérieur)."
    editor:
      preview: false
    files:
      - name: "ambiances"
        label: "Liste des ambiances"
        file: "src/data/ambiances.json"
        format: "json"
        fields:
          - name: items
            label: "Ambiances"
            label_singular: "Ambiance"
            widget: list
            summary: "{{fields.name}} — {{fields.style}}"
            fields:
              - { name: id, label: "ID (unique)", widget: number, value_type: int, min: 1 }
              - { name: name, label: "Nom", widget: string }
              - name: type
                label: "Type"
                widget: select
                options:
                  - { label: "Extérieur (façade)", value: "exterior" }
                  - { label: "Intérieur (hall, vestibule)", value: "interior" }
              - { name: style, label: "Style", widget: string, hint: "Ex. Contemporain, Haussmannien, Méditerranéen…" }
              - { name: forApartment, label: "OK pour appartement ?", widget: boolean, default: true }
              - { name: forHouse, label: "OK pour maison ?", widget: boolean, default: true }
              - { name: imageUrl, label: "Image", widget: image, required: false, allow_multiple: false, choose_url: false, hint: "Téléverse l'image. Stockée dans /ambiances/." }
              - { name: gradient, label: "Gradient (fallback si pas d'image)", widget: string, required: false, hint: "Classes Tailwind ex. from-amber-100 via-orange-50 to-stone-200" }
              - { name: accent, label: "Accent (fallback)", widget: string, required: false, hint: "Couleur rgba pour l'éclairage." }

  - name: "colors_collection"
    label: "Couleurs (RAL)"
    description: "Nuancier RAL utilisé pour porte intérieur, porte extérieur, bâti intérieur et bâti extérieur."
    files:
      - name: "colors"
        label: "Liste des couleurs"
        file: "src/data/colors.json"
        format: "json"
        fields:
          - name: items
            label: "Couleurs"
            label_singular: "Couleur"
            widget: list
            summary: "{{fields.name}} — {{fields.ral}}"
            fields:
              - { name: id, label: "ID slug (ex. noir-9005)", widget: string }
              - { name: name, label: "Nom", widget: string }
              - { name: ral, label: "Référence RAL", widget: string }
              - { name: hex, label: "Code hexadécimal #RRGGBB", widget: string }
              - { name: textOn, label: "Couleur du texte sur fond", widget: string, default: "#F5F0E8" }

  - name: "panels_collection"
    label: "Panneaux"
    description: "Matières et styles de panneau (acier mélaminé, aluminium, etc.)."
    files:
      - name: "panels"
        label: "Liste des panneaux"
        file: "src/data/panels.json"
        format: "json"
        fields:
          - name: items
            label: "Panneaux"
            label_singular: "Panneau"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: id, label: "ID slug", widget: string }
              - { name: name, label: "Nom", widget: string }
              - name: material
                label: "Matériau"
                widget: select
                options:
                  - { label: "Acier", value: "acier" }
                  - { label: "Aluminium", value: "alu" }
              - name: family
                label: "Famille / style"
                widget: select
                options:
                  - { label: "Mélaminé standard", value: "melamine" }
                  - { label: "Plaxé", value: "plaxe" }
                  - { label: "Contemporain", value: "contemporain" }
                  - { label: "Estampé", value: "estampe" }
                  - { label: "Mouluré", value: "moulure" }
              - { name: description, label: "Description", widget: text, required: false }
              - name: compatibleDoorIds
                label: "Portes compatibles (vide = toutes)"
                widget: list
                required: false
                field: { name: id, label: "ID porte", widget: number, value_type: int }

  - name: "handles_collection"
    label: "Poignées"
    files:
      - name: "handles"
        label: "Liste des poignées"
        file: "src/data/handles.json"
        format: "json"
        fields:
          - name: items
            label: "Poignées"
            label_singular: "Poignée"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: id, label: "ID slug", widget: string }
              - { name: name, label: "Nom", widget: string }
              - { name: description, label: "Description", widget: text, required: false }
              - name: style
                label: "Style"
                widget: select
                options:
                  - { label: "Verticale", value: "vertical" }
                  - { label: "Béquille", value: "lever" }
                  - { label: "Barre de tirage", value: "bar" }
              - name: finish
                label: "Finition métal"
                widget: select
                options:
                  - { label: "Inox", value: "inox" }
                  - { label: "Or / Laiton", value: "gold" }
              - name: compatibleDoorIds
                label: "Portes compatibles (vide = toutes)"
                widget: list
                required: false
                field: { name: id, label: "ID porte", widget: number, value_type: int }

  - name: "glasses_collection"
    label: "Vitrages"
    files:
      - name: "glasses"
        label: "Liste des vitrages"
        file: "src/data/glasses.json"
        format: "json"
        fields:
          - name: items
            label: "Vitrages"
            label_singular: "Vitrage"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: id, label: "ID slug", widget: string }
              - { name: name, label: "Nom", widget: string }
              - { name: description, label: "Description", widget: text, required: false }
              - name: layout
                label: "Disposition"
                widget: select
                options:
                  - { label: "Aucun", value: "none" }
                  - { label: "Hublot haut centré", value: "top_center" }
                  - { label: "Vertical latéral", value: "vertical_side" }
                  - { label: "Multi-géométrique", value: "multi_geo" }
              - name: compatibleDoorIds
                label: "Portes compatibles (vide = toutes)"
                widget: list
                required: false
                field: { name: id, label: "ID porte", widget: number, value_type: int }

  - name: "accessories_collection"
    label: "Accessoires"
    description: "Heurtoir, judas, entrebâilleur, bâton de maréchal, etc."
    files:
      - name: "accessories"
        label: "Liste des accessoires"
        file: "src/data/accessories.json"
        format: "json"
        fields:
          - name: items
            label: "Accessoires"
            label_singular: "Accessoire"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: id, label: "ID slug", widget: string }
              - { name: name, label: "Nom", widget: string }
              - { name: description, label: "Description", widget: text, required: false }
              - name: compatibleDoorIds
                label: "Portes compatibles (vide = toutes)"
                widget: list
                required: false
                field: { name: id, label: "ID porte", widget: number, value_type: int }

  - name: "finishes_collection"
    label: "Finitions"
    files:
      - name: "finishes"
        label: "Liste des finitions"
        file: "src/data/finishes.json"
        format: "json"
        fields:
          - name: items
            label: "Finitions"
            label_singular: "Finition"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: id, label: "ID slug", widget: string }
              - { name: name, label: "Nom", widget: string }
              - { name: description, label: "Description", widget: text, required: false }
